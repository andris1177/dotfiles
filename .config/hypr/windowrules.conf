# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# app specific opacity
windowrulev2 = opacity .9 .9 ,class:^(kitty)$
windowrulev2 = opacity .9 .9,class:^(kitty)$,title:^(.*nvim.*)$
windowrulev2 = opacity .9 .9 ,class:^(thunar)$
windowrulev2 = opacity .9 .9,class:^(discord)$
windowrulev2 = opacity .9 .9,title:^(SpeedCrunch)$
